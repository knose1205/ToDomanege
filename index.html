<style>
  :root{
    --paper:#EAF3E4;
    --paper-card:#FFFFFF;
    --paper-card-2:#F3F8EC;
    --ink:#2B3B2E;
    --ink-dim:#5C7060;
    --ink-faint:#8CA090;
    --brass:#F0A73E;
    --brass-bright:#FFBE5C;
    --rust:#E2574C;
    --line:#DCE8D6;
    --pri-high:#E2574C;
    --pri-med:#F0A73E;
    --pri-low:#4FA88A;
    --pri-none:#C7D3C0;
    --brass-text:#B9740F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'M PLUS Rounded 1c', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:48px 20px;
  }
  .book{
    width:100%;
    max-width:640px;
  }
  .cover{
    text-align:center;
    margin-bottom:8px;
  }
  .cover h1{
    font-family:'M PLUS Rounded 1c', sans-serif;
    font-weight:800;
    font-size:38px;
    margin:0;
    letter-spacing:0.5px;
  }
  .cover .sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink-faint);
    letter-spacing:2px;
    text-transform:uppercase;
    margin-top:6px;
  }
  .rule{
    height:2px;
    background:linear-gradient(90deg, transparent, var(--brass) 15%, var(--brass) 85%, transparent);
    margin:20px 0 28px;
    opacity:0.7;
  }
  .tabs{
    display:flex;
    gap:0;
    margin-bottom:18px;
    border-bottom:1px solid var(--line);
  }
  .tab{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--ink-faint);
    background:none;
    border:none;
    padding:8px 16px;
    cursor:pointer;
    position:relative;
  }
  .tab.active{
    color:var(--brass-text);
  }
  .tab.active::after{
    content:'';
    position:absolute;
    left:16px; right:16px; bottom:-1px;
    height:2px;
    background:var(--brass);
  }
  .ledger{
    background:var(--paper-card);
    border:1px solid var(--line);
    border-radius:4px;
    overflow:hidden;
  }
  .entry{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding:14px 18px;
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .entry:last-child{border-bottom:none;}
  .entry:nth-child(even){background:var(--paper-card-2);}
  .entry.child{
    padding-left:44px;
    background:var(--paper-card);
  }
  .entry.child .no{color:var(--ink-faint); min-width:34px;}
  .entry.child .task{font-size:14px;}
  .entry.child::before{
    content:'';
    position:absolute;
    left:var(--indent-left, 26px);
    top:0; bottom:50%;
    width:12px;
    border-left:1.5px solid var(--line);
    border-bottom:1.5px solid var(--line);
    border-radius:0 0 0 4px;
  }
  .branch-btn{
    background:none;
    border:1px dashed var(--ink-faint);
    color:var(--ink-faint);
    border-radius:3px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    padding:1px 6px;
    cursor:pointer;
    opacity:0;
    transition:opacity 0.15s, color 0.15s, border-color 0.15s;
    margin-left:auto;
  }
  .entry:hover .branch-btn{opacity:1;}
  .branch-btn.active{opacity:1; color:var(--brass-text); border-color:var(--brass); border-style:solid;}
  .branch-btn:hover{color:var(--brass-text); border-color:var(--brass);}
  .sub-add{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 18px 10px 44px;
    background:var(--paper-card);
    border-bottom:1px solid var(--line);
  }
  .sub-add input{
    flex:1;
    background:none;
    border:none;
    border-bottom:1px dotted var(--ink-faint);
    color:var(--ink);
    font-family:'M PLUS Rounded 1c', sans-serif;
    font-size:13px;
    padding:3px 2px;
    outline:none;
  }
  .sub-add input.due-input{
    flex:none;
    max-width:124px;
    border-bottom:none;
  }
  .sub-add .mini-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--brass-text);
    background:none;
    border:1px solid var(--brass);
    border-radius:3px;
    padding:4px 8px;
    cursor:pointer;
  }
  .no{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink-faint);
    padding-top:3px;
    min-width:26px;
  }
  .seal{
    width:20px; height:20px;
    border:1.5px solid var(--brass);
    border-radius:50%;
    flex-shrink:0;
    margin-top:1px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    background:transparent;
    transition:background 0.15s;
  }
  .seal.done{
    background:var(--brass);
  }
  .seal.done::after{
    content:'';
    width:6px; height:9px;
    border-right:2px solid #FFFFFF;
    border-bottom:2px solid #FFFFFF;
    transform:rotate(45deg) translate(-1px,-2px);
  }
  .task{
    flex:1;
    font-size:15px;
    line-height:1.5;
    padding-top:1px;
    word-break:break-word;
  }
  .task.done{
    color:var(--ink-faint);
    text-decoration:line-through;
    text-decoration-color:var(--ink-faint);
  }
  .stamp{
    font-family:'M PLUS Rounded 1c', sans-serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:1px;
    color:var(--rust);
    border:1.5px solid var(--rust);
    border-radius:3px;
    padding:1px 6px;
    transform:rotate(-6deg);
    white-space:nowrap;
    margin-left:8px;
    opacity:0.85;
    align-self:center;
  }
  .flag{
    width:14px; height:14px;
    border-radius:50%;
    flex-shrink:0;
    margin-top:5px;
    cursor:pointer;
    border:none;
    padding:0;
  }
  .flag[data-p="high"]{background:var(--pri-high);}
  .flag[data-p="med"]{background:var(--pri-med);}
  .flag[data-p="low"]{background:var(--pri-low);}
  .flag[data-p="none"]{background:var(--pri-none);}
  .flag-picker{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    color:var(--ink-faint);
  }
  .meta{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-faint);
    padding-top:3px;
    white-space:nowrap;
  }
  .del{
    background:none;
    border:none;
    color:var(--ink-faint);
    font-size:16px;
    cursor:pointer;
    padding:0 2px;
    line-height:1;
    opacity:0;
    transition:opacity 0.15s, color 0.15s;
  }
  .entry:hover .del{opacity:1;}
  .del:hover{color:var(--rust);}
  .add-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:16px 18px;
    background:var(--paper-card);
    border:1px dashed var(--line);
    border-radius:4px;
    margin-top:16px;
  }
  .add-row .no{color:var(--ink-faint);}
  .add-input{
    flex:1;
    background:none;
    border:none;
    border-bottom:1px dotted var(--ink-faint);
    color:var(--ink);
    font-family:'M PLUS Rounded 1c', sans-serif;
    font-size:15px;
    padding:4px 2px;
    outline:none;
  }
  .add-input::placeholder{color:var(--ink-faint);}
  .due-input{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--ink-dim);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:3px;
    padding:5px 6px;
    outline:none;
    max-width:132px;
  }
  .due{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-dim);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:3px;
    padding:1px 6px;
    white-space:nowrap;
  }
  .due.overdue{
    color:var(--rust);
    border-color:var(--rust);
  }
  .add-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#FFFFFF;
    background:var(--brass);
    border:none;
    border-radius:3px;
    padding:8px 14px;
    cursor:pointer;
    transition:background 0.15s;
  }
  .add-btn:hover{background:var(--brass-bright);}
  .empty{
    padding:36px 18px;
    text-align:center;
    color:var(--ink-faint);
    font-size:14px;
  }
  .empty .sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    margin-top:4px;
  }
  .footer{
    display:flex;
    justify-content:space-between;
    margin-top:14px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--ink-faint);
  }
  .clear-link{
    background:none;
    border:none;
    color:var(--ink-faint);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    cursor:pointer;
    text-decoration:underline;
  }
  .clear-link:hover{color:var(--rust);}
</style>
</head>
<body>
<div class="book">
  <div class="cover">
    <h1>ToDo管理 <span style="font-style:italic; font-weight:400; color:var(--ink-dim);">
   </div>
  <div class="rule"></div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-filter="all">すべて</button>
    <button class="tab" data-filter="active">未処理</button>
    <button class="tab" data-filter="done">対応済み</button>
  </div>

  <div class="ledger" id="ledger"></div>

  <div class="add-row">
    <span class="no" id="nextNo">—</span>
    <input class="add-input" id="addInput" type="text" placeholder="新しい用件を記入する…" />
    <input class="due-input" id="addDue" type="date" aria-label="期限" />
    <span class="flag-picker">
      <button class="flag" id="newFlag" data-p="none" aria-label="優先度を切り替える"></button>
      <span id="newFlagLabel">なし</span>
    </span>
    <button class="add-btn" id="addBtn">記入</button>
  </div>

  <div class="footer">
    <span id="countLabel">0 件の未処理</span>
    <span style="display:flex; gap:14px;">
      <button class="clear-link" id="exportCsv">CSVで書き出す</button>
      <button class="clear-link" id="clearDone">対応済みを消去</button>
    </span>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'ledger-todos';
  let todos = [];
  let filter = 'all';
  let nextId = 1;

  const ledgerEl = document.getElementById('ledger');
  const addInput = document.getElementById('addInput');
  const addBtn = document.getElementById('addBtn');
  const nextNoEl = document.getElementById('nextNo');
  const countLabel = document.getElementById('countLabel');
  const tabs = document.querySelectorAll('.tab');
  const clearDoneBtn = document.getElementById('clearDone');
  const newFlag = document.getElementById('newFlag');
  const newFlagLabel = document.getElementById('newFlagLabel');
  const addDue = document.getElementById('addDue');

  const PRIORITY_CYCLE = ['none','low','med','high'];
  const PRIORITY_LABEL = {none:'なし', low:'低', med:'中', high:'高'};
  let newPriority = 'none';
  let openSubFor = null;

  function nextPriority(p){
    const i = PRIORITY_CYCLE.indexOf(p);
    return PRIORITY_CYCLE[(i+1) % PRIORITY_CYCLE.length];
  }

  newFlag.addEventListener('click', ()=>{
    newPriority = nextPriority(newPriority);
    newFlag.dataset.p = newPriority;
    newFlagLabel.textContent = PRIORITY_LABEL[newPriority];
  });

  async function load(){
    try{
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){
        const parsed = JSON.parse(res.value);
        todos = parsed.todos || [];
        nextId = parsed.nextId || (todos.length + 1);
      }
    }catch(e){
      todos = [];
    }
    render();
  }

  async function save(){
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify({todos, nextId}), false);
    }catch(e){
      console.error('保存に失敗しました', e);
    }
  }

  function formatDate(ts){
    const d = new Date(ts);
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return mm + '/' + dd;
  }

  function addTodo(text){
    text = text.trim();
    if(!text) return;
    todos.push({id: nextId++, text, done:false, ts: Date.now(), priority:newPriority, parentId:null, dueDate: addDue.value || null});
    addInput.value = '';
    addDue.value = '';
    newPriority = 'none';
    newFlag.dataset.p = 'none';
    newFlagLabel.textContent = PRIORITY_LABEL['none'];
    save();
    render();
  }

  function addSubTodo(parentId, text, dueDate){
    text = text.trim();
    if(!text) return;
    todos.push({id: nextId++, text, done:false, ts: Date.now(), priority:'none', parentId, dueDate: dueDate || null});
    save();
    render();
  }

  function toggleTodo(id){
    const t = todos.find(t=>t.id===id);
    if(t){ t.done = !t.done; save(); render(); }
  }

  function cyclePriority(id){
    const t = todos.find(t=>t.id===id);
    if(t){ t.priority = nextPriority(t.priority || 'none'); save(); render(); }
  }

  function deleteTodo(id){
    const toDelete = new Set([id, ...collectDescendantIds(id)]);
    todos = todos.filter(t=>!toDelete.has(t.id));
    save();
    render();
  }

  function clearDone(){
    todos = todos.filter(t=>!t.done);
    save();
    render();
  }

  function matchesFilter(t){
    if(filter==='active') return !t.done;
    if(filter==='done') return t.done;
    return true;
  }

  function childrenOf(id){
    return todos.filter(c=>c.parentId===id);
  }

  function isVisible(t){
    if(matchesFilter(t)) return true;
    return childrenOf(t.id).some(isVisible);
  }

  function collectDescendantIds(id){
    let ids = [];
    childrenOf(id).forEach(c=>{
      ids.push(c.id);
      ids = ids.concat(collectDescendantIds(c.id));
    });
    return ids;
  }

  function indentPx(depth){
    return 44 + Math.max(depth-1,0) * 26;
  }

  function render(){
    const tops = todos.filter(t=>!t.parentId);
    const visibleTops = tops.filter(isVisible);

    ledgerEl.innerHTML = '';
    if(visibleTops.length === 0){
      const emptyMsg = filter==='done' ? '対応済みの項目はまだありません。' :
                       filter==='active' ? 'すべて対応済みです。よくやりました。' :
                       '台帳は空です。最初の一件を記入してください。';
      ledgerEl.innerHTML = '<div class="empty">' + emptyMsg + '<div class="sub">— 下の欄からどうぞ —</div></div>';
    } else {
      visibleTops.forEach((t, i)=>{
        const topNo = String(i+1).padStart(2,'0');
        ledgerEl.appendChild(buildRow(t, topNo, 0));
        if(openSubFor === t.id){
          ledgerEl.appendChild(buildSubAddRow(t.id, 0));
        }
        buildTree(t.id, topNo, 1);
      });
    }

    ledgerEl.querySelectorAll('.seal').forEach(btn=>{
      btn.addEventListener('click', ()=> toggleTodo(Number(btn.dataset.id)));
    });
    ledgerEl.querySelectorAll('.del').forEach(btn=>{
      btn.addEventListener('click', ()=> deleteTodo(Number(btn.dataset.id)));
    });
    ledgerEl.querySelectorAll('.flag[data-flag-id]').forEach(btn=>{
      btn.addEventListener('click', ()=> cyclePriority(Number(btn.dataset.flagId)));
    });
    ledgerEl.querySelectorAll('.branch-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = Number(btn.dataset.id);
        openSubFor = (openSubFor === id) ? null : id;
        render();
      });
    });
    const subInput = ledgerEl.querySelector('.sub-add input');
    if(subInput) subInput.focus();

    nextNoEl.textContent = String(tops.length+1).padStart(2,'0');
    const activeCount = todos.filter(t=>!t.done).length;
    countLabel.textContent = activeCount + ' 件の未処理';
  }

  function buildTree(parentId, no, depth){
    const kids = childrenOf(parentId).filter(isVisible);
    kids.forEach((c, j)=>{
      const letter = String.fromCharCode(97 + j);
      const childNo = no + '-' + letter;
      ledgerEl.appendChild(buildRow(c, childNo, depth));
      if(openSubFor === c.id){
        ledgerEl.appendChild(buildSubAddRow(c.id, depth));
      }
      buildTree(c.id, childNo, depth + 1);
    });
  }

  function formatDue(iso){
    const [y,m,d] = iso.split('-');
    return m + '/' + d;
  }

  function isOverdue(t){
    if(!t.dueDate || t.done) return false;
    const today = new Date();
    today.setHours(0,0,0,0);
    return new Date(t.dueDate + 'T00:00:00') < today;
  }

  function buildRow(t, no, depth){
    const row = document.createElement('div');
    const isChild = depth > 0;
    row.className = 'entry' + (isChild ? ' child' : '');
    if(isChild){
      row.style.paddingLeft = indentPx(depth) + 'px';
      row.style.setProperty('--indent-left', (indentPx(depth) - 18) + 'px');
    }
    const p = t.priority || 'none';
    const dueBadge = t.dueDate ? '<span class="due' + (isOverdue(t)?' overdue':'') + '">期限 ' + formatDue(t.dueDate) + '</span>' : '';
    row.innerHTML =
      '<span class="no">' + no + '</span>' +
      '<button class="seal' + (t.done?' done':'') + '" data-id="' + t.id + '" aria-label="完了を切り替える"></button>' +
      '<button class="flag" data-p="' + p + '" data-flag-id="' + t.id + '" aria-label="優先度: ' + PRIORITY_LABEL[p] + '（クリックで変更）" title="優先度: ' + PRIORITY_LABEL[p] + '"></button>' +
      '<span class="task' + (t.done?' done':'') + '">' + escapeHtml(t.text) + '</span>' +
      (t.done ? '<span class="stamp">対応済み</span>' : '') +
      dueBadge +
      '<span class="meta">' + formatDate(t.ts) + '</span>' +
      '<button class="branch-btn' + (openSubFor===t.id?' active':'') + '" data-id="' + t.id + '" title="派生タスクを追加">＋派生</button>' +
      '<button class="del" data-id="' + t.id + '" aria-label="削除">×</button>';
    return row;
  }

  function buildSubAddRow(parentId, depth){
    const row = document.createElement('div');
    row.className = 'sub-add';
    row.style.paddingLeft = indentPx(depth + 1) + 'px';
    row.innerHTML =
      '<input type="text" placeholder="派生タスクを記入する…" />' +
      '<input type="date" class="due-input" aria-label="期限" />' +
      '<button class="mini-btn">追加</button>';
    const input = row.querySelector('input[type="text"]');
    const dueInput = row.querySelector('input[type="date"]');
    const btn = row.querySelector('.mini-btn');
    const submit = ()=>{
      addSubTodo(parentId, input.value, dueInput.value);
    };
    btn.addEventListener('click', submit);
    input.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') submit();
    });
    return row;
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function toCsvField(v){
    if(v===null || v===undefined) v = '';
    v = String(v);
    if(/[",\n]/.test(v)){
      v = '"' + v.replace(/"/g, '""') + '"';
    }
    return v;
  }

  function exportCsv(){
    const header = ['番号','親タスク番号','内容','優先度','期限','状態','作成日'];
    const rows = [header];
    const tops = todos.filter(t=>!t.parentId);

    function addRows(list, no, parentNo){
      list.forEach((t,i)=>{
        const thisNo = parentNo ? (no + '-' + String.fromCharCode(97+i)) : String(i+1).padStart(2,'0');
        rows.push([thisNo, parentNo||'', t.text, PRIORITY_LABEL[t.priority||'none'], t.dueDate||'', t.done?'対応済み':'未処理', formatDate(t.ts)]);
        addRows(childrenOf(t.id), thisNo, thisNo);
      });
    }
    addRows(tops, '', '');

    const csv = rows.map(r=>r.map(toCsvField).join(',')).join('\r\n');
    const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth()+1).padStart(2,'0');
    const d = String(today.getDate()).padStart(2,'0');
    a.href = url;
    a.download = 'ledger-' + y + m + d + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  document.getElementById('exportCsv').addEventListener('click', exportCsv);

  addBtn.addEventListener('click', ()=> addTodo(addInput.value));
  addInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') addTodo(addInput.value);
  });
  clearDoneBtn.addEventListener('click', clearDone);
  tabs.forEach(tab=>{
    tab.addEventListener('click', ()=>{
      tabs.forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      filter = tab.dataset.filter;
      render();
    });
  });

  load();
})();
</script>
</body>
</html>
